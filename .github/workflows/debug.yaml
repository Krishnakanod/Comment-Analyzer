name: Debug EC2 SSH

on:
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          timeout: 60s
          command_timeout: 30s

          script: |
            echo "===== SSH SUCCESS ====="
            whoami
            hostname
            pwd
            ls -la
            echo "===== DONE ====="