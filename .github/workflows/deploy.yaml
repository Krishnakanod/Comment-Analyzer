name: Deploy Backend

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: yt-comment-analysis-plugin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. NEW: Set up Python to install DVC
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 2. NEW: Install dependencies (DVC) and fetch the model
      - name: Fetch Model via DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          pip install dvc dvc-s3  # Added dvc-s3 assuming your DVC remote is an S3 bucket
          dvc pull

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Docker will now succeed because `dvc pull` placed the .pkl file here!
      - name: Build Docker Image
        run: |
          docker build -t yt-comment-analysis-plugin .

      - name: Tag Docker Image
        run: |
          docker tag yt-comment-analysis-plugin:latest \
          016647419459.dkr.ecr.${AWS_REGION}.amazonaws.com/yt-comment-analysis-plugin:latest

      - name: Push Docker Image
        run: |
          docker push \
          016647419459.dkr.ecr.${AWS_REGION}.amazonaws.com/yt-comment-analysis-plugin:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            debug: true
            # 3. IMPROVED: Changed the hardcoded 'eu-north-1' to use your environment variable 
            # to prevent region mismatches.
            script: |
              aws ecr get-login-password \
              --region ${{ secrets.AWS_REGION }} \
              | docker login \
              --username AWS \
              --password-stdin \
              016647419459.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

              cd ~/app

              docker compose pull

              docker compose up -d

              docker image prune -f