<!DOCTYPE html>
<html>
<head>
  <title>YouTube Comment Analyzer</title>
  <style>
    /* Dark Theme */
    body {
      font-family: "Segoe UI", sans-serif;
      padding: 10px;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      box-sizing: border-box;
      width: 500px; /* Set a width that fits the Chrome extension popup */
    }
    h1 {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
    color: white;
}
   .section {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
}
    .section-title {
      font-weight: bold;
      color: #0099ff;
      margin-top: 10px;
      font-size: 15px;
    }
    .comment-list {
      list-style: none;
      padding: 0;
    }
    .comment-item {
      margin: 8px 0;
      padding: 8px;
      background-color: #444;
      border-radius: 4px;
    }
    .comment-sentiment {
      font-weight: bold;
      color: #ffffff;
    }
    /* Image Styling */
    img {
      width: 100%;
      margin-top: 20px;
    }
    /* Metrics Styling */
    .metrics-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}
    .metric {
      width: 75%;
      background-color: #444;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 3px;
      text-align: center;
      box-sizing: border-box;
    }
    .metric-title {
      font-size: 15px;
      color: #cccccc;
    }
   .metric-value {
    font-size: 15px;
    font-weight: 700;
}
    .primary-button {
      width: 100%;
      padding: 12px 14px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background-color: #0099ff;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
    }
    .primary-button:hover {
      background-color: #007acc;
    }
   .summary-text {
    background: #111827;
    border-radius: 12px;
    padding: 16px;
    line-height: 1.8;
    border: 1px solid #374151;
}
  </style>
</head>
<body>
  <h1>YouTube Comment Analyzer</h1>
  <div id="output" class="section"></div>
  <script src="popup.js"></script>
</body>
</html>
